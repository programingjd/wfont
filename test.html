<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%;font:3vmin monospace;background:#222;color:#eee}
body{min-height:100%;padding:1rem;display:grid;place-items:center}
main{display:flex;flex-direction:column}
a{color:inherit}
a:not([href]):after{
  content:'...';
  animation:spinner 800ms steps(5) infinite;
  font-family:monospace;
}
@keyframes spinner{
  0%{content:"..."}
  20%{content:"\00a0.."}
  40%{content:"\00a0\00a0."}
  60%{content:".\00a0\00a0"}
  80%{content:"..\00a0"}
}
</style>
</head>
<body>
<main>
  <a>Subsetting font</a>
</main>
</body>
<script type="module">
import subset from './lib.mjs';

const link=document.querySelector('main>a');
const t0=Date.now();
const abortController=new AbortController();
const output=await subset(abortController.signal);
const t1=Date.now();
console.log(`${t1-t0}ms`);
const blob=new Blob([output],{type: 'application/octet-stream'});
link.href=URL.createObjectURL(blob);
link.download='subset.bin';
link.textContent=`Proof generated (${output.length}b)`;
</script>
</html>
